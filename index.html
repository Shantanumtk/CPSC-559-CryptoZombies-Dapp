<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CryptoZombies</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.2.7-rc.0/web3.min.js"></script>

<style>
body{
  font-family: Arial;
  margin:20px;
}

#zombies{
  margin-top:20px;
}

.zombie{
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2>CryptoZombies</h2>

<div id="txStatus"></div>

<input id="name" placeholder="Zombie name">

<button onclick="createZombie()">Create Zombie</button>
<button onclick="showZombies()">Show Zombies</button>
<button onclick="levelUpFirst()">Level Up First Zombie</button>

<div id="zombies"></div>

<script>

let web3
let cryptoZombies
let userAccount

async function init(){

if(window.ethereum){

web3 = new Web3(window.ethereum)

await window.ethereum.request({method:"eth_requestAccounts"})

const accounts = await web3.eth.getAccounts()

userAccount = accounts[0]

loadContract()

}
}

async function loadContract(){

const response = await fetch("./build/contracts/ZombieOwnership.json")

const artifact = await response.json()

const abi = artifact.abi

const networkId = await web3.eth.net.getId()

const address = artifact.networks[networkId].address

cryptoZombies = new web3.eth.Contract(abi,address)

console.log("contract loaded:",address)

}

function setStatus(message){

document.getElementById("txStatus").innerText = message

}

function createZombie(){

const name = document.getElementById("name").value || "MyZombie"

setStatus("Creating zombie...")

cryptoZombies.methods.createRandomZombie(name)
.send({from:userAccount})
.on("receipt",function(){

setStatus("Zombie created!")

showZombies()

})
.on("error",function(err){

setStatus(err.message)

})

}

function showZombies(){

cryptoZombies.methods.getZombiesByOwner(userAccount).call()
.then(function(ids){

$("#zombies").empty()

for(let i=0;i<ids.length;i++){

cryptoZombies.methods.zombies(ids[i]).call()
.then(function(z){

$("#zombies").append(

`<div class="zombie">
Name: ${z.name}<br>
DNA: ${z.dna}<br>
Level: ${z.level}
</div>`

)

})

}

})

}

function levelUpFirst(){

cryptoZombies.methods.getZombiesByOwner(userAccount).call()
.then(function(ids){

if(ids.length==0){

setStatus("No zombie found")

return

}

cryptoZombies.methods.levelUp(ids[0])
.send({
from:userAccount,
value:web3.utils.toWei("0.001","ether")
})
.on("receipt",function(){

setStatus("Zombie leveled up")

showZombies()

})

})

}

window.addEventListener("load",init)

</script>

</body>
</html>
