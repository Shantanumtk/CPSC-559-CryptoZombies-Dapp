<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CryptoZombies DApp</title>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.7.5/dist/web3.min.js"></script>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input {
      padding: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
      width: 240px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: #16a34a;
    }

    .show-btn {
      margin-bottom: 10px;
    }

    .zombie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .zombie-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .zombie-card h3 {
      margin-top: 0;
    }

    .dna {
      font-size: 12px;
      color: #94a3b8;
      word-break: break-all;
      margin-bottom: 10px;
    }

    .level {
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .stats {
      margin-bottom: 12px;
    }

    .level-btn {
      margin-bottom: 10px;
    }

    .empty-message {
      color: #94a3b8;
      margin-top: 10px;
    }

    .zombie-img {
      width: 180px;
      margin: 12px 0;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🧟 CryptoZombies</h1>

    <div class="controls">
      <div class="control-group">
        <input id="nameInput" placeholder="Zombie name">
        <button onclick="createZombie()">Create Zombie</button>
      </div>

      <div class="control-group">
        <input id="searchInput" placeholder="Search Zombies" oninput="searchZombies()">
        <button onclick="searchZombies()">Search</button>
      </div>
    </div>

    <button class="show-btn" onclick="loadZombies()">Show Zombies</button>

    <h2>Your Zombie Army</h2>

    <div id="zombies" class="zombie-grid"></div>
    <div id="emptyMessage" class="empty-message"></div>
  </div>

<h3>Zombie Actions</h3>

<input id="zombieId" placeholder="Zombie ID">
<input id="targetAddress" placeholder="Transfer address">
<button onclick="showOwner()">Show Owner</button>
<button onclick="transferZombie()">Transfer Zombie</button>


  <script>
    let zombieArmy = [];
    let web3;
    let contract;
    let account;

    const IMAGE_SRC = "./zommod.png";

    async function init() {
      try {
        if (!window.ethereum) {
          alert("MetaMask not detected.");
          return;
        }

        web3 = new Web3(window.ethereum);
        await window.ethereum.request({ method: "eth_requestAccounts" });

        const accounts = await web3.eth.getAccounts();
        account = accounts[0];

        const response = await fetch("./build/contracts/ZombieOwnership.json");
        const data = await response.json();

        const currentNetworkId = await web3.eth.net.getId();
        const deployedNetwork = data.networks[currentNetworkId];

        if (!deployedNetwork) {
          alert("Contract not found on the current network. Make sure MetaMask is on Ganache and contracts are redeployed.");
          return;
        }

        contract = new web3.eth.Contract(data.abi, deployedNetwork.address);

        await loadZombies();
      } catch (err) {
        console.error("Init error:", err);
        alert("Init failed. Open browser console.");
      }
    }

    window.addEventListener("load", init);

    async function createZombie() {
      try {
        const name = document.getElementById("nameInput").value.trim();

        if (!name) {
          alert("Please enter a zombie name.");
          return;
        }

        await contract.methods.createRandomZombie(name).send({ from: account });

        document.getElementById("nameInput").value = "";
        await loadZombies();
      } catch (err) {
        console.error("Create zombie error:", err);
        alert("Create zombie failed. Open browser console.");
      }
    }

    async function loadZombies() {
      try {
        if (!contract || !account) return;

        const ids = await contract.methods.getZombiesByOwner(account).call();

        zombieArmy = [];
        document.getElementById("zombies").innerHTML = "";
        document.getElementById("emptyMessage").innerText = "";

        for (let i = 0; i < ids.length; i++) {
          const zombie = await contract.methods.zombies(ids[i]).call();

          zombieArmy.push({
            id: ids[i],
            name: zombie.name,
            dna: zombie.dna,
            level: zombie.level,
            winCount: zombie.winCount,
            lossCount: zombie.lossCount
          });
        }

        renderZombieList(zombieArmy);

        if (ids.length === 0) {
          document.getElementById("emptyMessage").innerText = "No zombies found.";
        }
      } catch (err) {
        console.error("Load zombies error:", err);
        alert("Load zombies failed. Open browser console.");
      }
    }

    function renderZombieList(list) {
      const zombiesContainer = document.getElementById("zombies");
      zombiesContainer.innerHTML = "";

      list.forEach((zombie) => {
        displayZombie(zombie);
      });
    }

    function displayZombie(zombie) {
      const card = document.createElement("div");
      card.className = "zombie-card";

      card.innerHTML = `
        <h3>${zombie.name}</h3>

        <img src="${IMAGE_SRC}" class="zombie-img" alt="Zombie">

        <div class="dna">DNA: ${zombie.dna}</div>

        <div class="level">Level: ${zombie.level}</div>

        <div class="stats">
          Wins: ${zombie.winCount} | Losses: ${zombie.lossCount}
        </div>

        <button class="level-btn" onclick="levelUp(${zombie.id})">
          Level Up
        </button>

        <button onclick="randomizeColor(this)">
          Randomize Color
        </button>
      `;

      document.getElementById("zombies").appendChild(card);
    }

    async function levelUp(id) {
      try {
  await contract.methods.levelUp(id).send({
    from: account,
    value: web3.utils.toWei("0.001", "ether")
  });

  await loadZombies();
} catch (err) {
  console.error("Level up error:", err);
  alert("Level up failed. Open browser console.");
}
    }

    function searchZombies() {
      const query = document.getElementById("searchInput").value.toLowerCase().trim();
      document.getElementById("emptyMessage").innerText = "";

      if (query === "") {
        renderZombieList(zombieArmy);

        if (zombieArmy.length === 0) {
          document.getElementById("emptyMessage").innerText = "No zombies found.";
        }
        return;
      }

      const filtered = zombieArmy.filter((zombie) =>
        zombie.name.toLowerCase().includes(query) ||
        zombie.dna.toString().includes(query) ||
        zombie.level.toString().includes(query)
      );

      renderZombieList(filtered);

      if (filtered.length === 0) {
        document.getElementById("emptyMessage").innerText = "No matches found.";
      }
    }



async function showOwner(){

  try{
    const id = document.getElementById("zombieId").value;

    const owner = await contract.methods.ownerOf(id).call();

    alert("Owner of zombie " + id + " is " + owner);

  }catch(err){
    console.error(err);
    alert("Failed to get owner");
  }

}

async function transferZombie(){

  try{
    const id = document.getElementById("zombieId").value;
    const address = document.getElementById("targetAddress").value;

    if(!web3.utils.isAddress(address)){
      alert("Invalid address");
      return;
    }

    await contract.methods.transferFrom(account,address,id)
      .send({from:account});

    alert("Zombie transferred!");

    await loadZombies();

  }catch(err){
    console.error(err);
    alert("Transfer failed");
  }

}


window.addEventListener("load",init)



    function randomizeColor(button) {
      const card = button.parentElement;
      const img = card.querySelector("img");
      const hue = Math.floor(Math.random() * 360);
      img.style.filter = `hue-rotate(${hue}deg)`;
    }
  </script>
</body>
</html>
