<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CryptoZombies DApp</title>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.7.5/dist/web3.min.js"></script>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input {
      padding: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
      width: 240px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: #16a34a;
    }

    .show-btn {
      margin-bottom: 10px;
    }

    .zombie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .zombie-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
    }

    .zombie-card h3 {
      margin-top: 0;
    }

    .dna {
      font-size: 12px;
      color: #94a3b8;
      word-break: break-all;
      margin-bottom: 10px;
    }

    .level {
      margin-top: 8px;
    }

    .stats {
      margin-bottom: 10px;
    }

    .level-btn {
      padding: 10px 16px;
    }

    .empty-message {
      color: #94a3b8;
      margin-top: 10px;
    }
	
	
	.zombie-display-section {
  margin: 30px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 28px;
  align-items: flex-start;
}

canvas {
  display: block;
  max-width: 320px;
  max-height: 55vh;
  border: 2px solid #333;
  border-radius: 10px;
  background: #000;
}
  </style>
</head>

<body>
  <div class="container">
    <h1>🧟 CryptoZombies</h1>

    <div class="controls">
      <div class="control-group">
        <input id="nameInput" placeholder="Zombie name">
        <button onclick="createZombie()">Create Zombie</button>
      </div>

      <div class="control-group">
        <input id="searchInput" placeholder="Search Zombies" oninput="searchZombies()">
        <button onclick="searchZombies()">Search</button>
      </div>
    </div>

    <button class="show-btn" onclick="loadZombies()">Show Zombies</button>

    <h2>Your Zombie Army</h2>

    <div id="zombies" class="zombie-grid"></div>
    <div id="emptyMessage" class="empty-message"></div>
  </div>







<div class="btn-row">
  <button class="action" id="changeBtn" disabled>Randomize Zombie Color</button>
</div>


<div class="zombie-display-section">
  <canvas id="canvas"></canvas>


    <div class="color-swatch" id="colorSwatch"></div>
</div>

var originalImageData = null;
var imageReady = false;
var canvas    = document.getElementById('canvas');
var ctx       = canvas.getContext('2d');
var changeBtn = document.getElementById('changeBtn');


var img = new Image();
img.onload = function () {
  canvas.width  = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  imageReady = true;
  changeBtn.disabled = false;
};

img.src = IMAGE_SRC;

function generate16DigitCode() {
  var code = String(Math.floor(Math.random() * 9) + 1);
  for (var i = 1; i < 16; i++) code += String(Math.floor(Math.random() * 10));
  return code;
}

  var iRaw = parseInt(code.substring(12, 16), 10);
  return {
    r:         Math.round((rRaw / 9999) * 255),
    g:         Math.round((gRaw / 9999) * 255),
    b:         Math.round((bRaw / 9999) * 255),
    intensity: Math.round((iRaw / 9999) * 100)
  };
}

function updateInfoPanel(code, r, g, b, intensity) {

  document.getElementById('colorSwatch').style.background =
    'rgb(' + r + ',' + g + ',' + b + ')';
}

function applyColor(r, g, b, intensityPercent) {
  if (!originalImageData) return;
  var src  = originalImageData.data;
  var copy = ctx.createImageData(canvas.width, canvas.height);
  var dst  = copy.data;
  var t    = intensityPercent / 100;

  for (var i = 0; i < src.length; i += 4) {
    var a = src[i + 3];
    if (a === 0) { dst[i]=0; dst[i+1]=0; dst[i+2]=0; dst[i+3]=0; continue; }

    var lum   = 0.299 * src[i] + 0.587 * src[i+1] + 0.114 * src[i+2];
    var tintR = (r / 255) * lum;
    var tintG = (g / 255) * lum;
    var tintB = (b / 255) * lum;

    dst[i]     = Math.round(src[i]   + (tintR - src[i])   * t);
    dst[i + 1] = Math.round(src[i+1] + (tintG - src[i+1]) * t);
    dst[i + 2] = Math.round(src[i+2] + (tintB - src[i+2]) * t);
    dst[i + 3] = a;
  }
  ctx.putImageData(copy, 0, 0);
}

changeBtn.addEventListener('click', function () {
  if (!imageReady) return;
  var code   = generate16DigitCode();
  var parsed = parseCode(code);
  updateInfoPanel(code, parsed.r, parsed.g, parsed.b, parsed.intensity);
  applyColor(parsed.r, parsed.g, parsed.b, parsed.intensity);
});




function applyFromCode(code) {
  if (typeof code !== 'string' || code.length !== 16 || !/^\d{16}$/.test(code)) {
    console.error('applyFromCode expects a 16-digit numeric string');
    return;
  }
  if (!imageReady) { console.error('Image not loaded yet'); return; }
  var parsed = parseCode(code);
  updateInfoPanel(code, parsed.r, parsed.g, parsed.b, parsed.intensity);
  applyColor(parsed.r, parsed.g, parsed.b, parsed.intensity);
}








































async function init() {
  if (!window.ethereum) {
    alert("MetaMask not detected.");
    return;
  }

  web3 = new Web3(window.ethereum);

  await window.ethereum.request({ method: "eth_requestAccounts" });

  const accounts = await web3.eth.getAccounts();
  account = accounts[0];

  const response = await fetch("./build/contracts/ZombieOwnership.json");
  const data = await response.json();

  const currentNetworkId = await web3.eth.net.getId();
  const deployedNetwork = data.networks[currentNetworkId];

  if (!deployedNetwork) {
    alert("Contract not found on the current network. Please make sure MetaMask is on Ganache and contracts are redeployed.");
    return;
  }

  contract = new web3.eth.Contract(data.abi, deployedNetwork.address);
}

window.addEventListener("load", init);

async function createZombie() {
  const name = document.getElementById("nameInput").value.trim();

  if (!name) {
    alert("Please enter a zombie name.");
    return;
  }

  await contract.methods
    .createRandomZombie(name)
    .send({ from: account });
  
  document.getElementById("nameInput").value = "";
  await loadZombies();
}

async function loadZombies() {
  if (!contract || !account) return;

  const ids = await contract.methods
    .getZombiesByOwner(account)
    .call();

  zombieArmy = [];
  document.getElementById("zombies").innerHTML = "";
  document.getElementById("emptyMessage").innerText = "";

  for (let i = 0; i < ids.length; i++) {
    const zombie = await contract.methods
      .zombies(ids[i])
      .call();

    const zombieData = {
      id: ids[i],
      ...zombie
    };
	applyFromCode(ids[i])
    zombieArmy.push(zombieData);
  }

  renderZombieList(zombieArmy);

  if (ids.length === 0) {
    document.getElementById("emptyMessage").innerText = "No zombies found.";
  }
}

function renderZombieList(list) {
  const zombiesContainer = document.getElementById("zombies");
  zombiesContainer.innerHTML = "";
  
  list.forEach((zombie) => {
    displayZombie(zombie);
  });
}

function displayZombie(zombie) {
  const card = document.createElement("div");
  card.className = "zombie-card";

  card.innerHTML = `
    <h3>${zombie.name}</h3>

    <div class="dna">
      DNA: ${zombie.dna}
    </div>

    <div class="level">
      Level: ${zombie.level}
    </div>

    <div class="stats">
      Wins: ${zombie.winCount} | Losses: ${zombie.lossCount}
    </div>

    <button class="level-btn" onclick="levelUp(${zombie.id})">
      Level Up
    </button>
	
	<div class="zombie-display-section">
	<canvas id="canvas"></canvas>


    <div class="color-swatch" id="colorSwatch"></div>
	</div>
  `;

  document.getElementById("zombies").appendChild(card);
}

async function levelUp(id) {
  await contract.methods
    .levelUp(id)
    .send({
      from: account,
      value: web3.utils.toWei("0.001", "ether")
    });

  await loadZombies();
}

function searchZombies() {
  const query = document
    .getElementById("searchInput")
    .value
    .toLowerCase()
    .trim();

  document.getElementById("emptyMessage").innerText = "";

  if (query === "") {
    renderZombieList(zombieArmy);

    if (zombieArmy.length === 0) {
      document.getElementById("emptyMessage").innerText = "No zombies found.";
    }
    return;
  }

  const filtered = zombieArmy.filter((zombie) =>
    zombie.name.toLowerCase().includes(query) ||
    zombie.dna.toString().includes(query) ||
    zombie.level.toString().includes(query)
  );

  renderZombieList(filtered);

  if (filtered.length === 0) {
    document.getElementById("emptyMessage").innerText = "No matches found.";
  }
}
</script>
